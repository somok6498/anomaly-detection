openapi: 3.0.1
info:
  title: Anomaly Detection API
  description: |
    Real-time behavioral anomaly detection system for banking transactions.

    The system evaluates incoming transactions against a client's historical behavioral
    profile using a combination of 15 rule-based evaluators and an Isolation Forest ML model,
    with EWMA-based client profiling, ops review queue with feedback-driven rule auto-tuning,
    WhatsApp/SMS alerts, and full OpenTelemetry observability.

    **Evaluation Pipeline:**
    1. Receive transaction via `POST /transactions/evaluate`
    2. Load/create client behavioral profile (EWMA stats)
    3. Build evaluation context (hourly counters, beneficiary data)
    4. Evaluate against all active anomaly rules (16 evaluators)
    5. Compute weighted composite risk score (0–100)
    6. Determine action: **PASS** (<30), **ALERT** (30–70), **BLOCK** (≥70)
    7. Update client profile with new transaction data
    8. Persist transaction + evaluation result
    9. Enqueue ALERT/BLOCK transactions for ops review
    10. Send WhatsApp/SMS alert (async, BLOCK only)

    **Rule Types:** TRANSACTION_TYPE_ANOMALY, TPS_SPIKE, AMOUNT_ANOMALY, HOURLY_AMOUNT_ANOMALY,
    AMOUNT_PER_TYPE_ANOMALY, BENEFICIARY_RAPID_REPEAT, BENEFICIARY_CONCENTRATION,
    BENEFICIARY_AMOUNT_REPETITION, DAILY_CUMULATIVE_AMOUNT, NEW_BENEFICIARY_VELOCITY,
    DORMANCY_REACTIVATION, CROSS_CHANNEL_BENEFICIARY_AMOUNT, SEASONAL_DEVIATION,
    MULE_NETWORK, TEMPORAL_RULE_CORRELATION, ISOLATION_FOREST

    **New in 3.0.0:** Advanced Analytics endpoints — top risk clients, system overview,
    cross-client transaction search, dry-run simulation, anomaly trends, mule candidates,
    investigation reports, and rule correlation analysis.
  version: 3.0.0
  contact:
    name: Anomaly Detection Team

servers:
  - url: http://localhost:8080
    description: Local development server

tags:
  - name: Transactions
    description: Submit transactions for evaluation and query history
  - name: Profiles
    description: View client behavioral profiles
  - name: Rules
    description: Manage anomaly detection rules
  - name: Models
    description: Isolation Forest model training and metadata
  - name: Review Queue
    description: Ops review queue with feedback loop and auto-tuning
  - name: Analytics
    description: Rule performance analytics, AI feedback stats, network graphs, client narratives
  - name: Configuration
    description: Live-reloadable system configuration
  - name: Silence Detection
    description: Detect when normally-active clients stop transacting
  - name: Beneficiary Graph
    description: Mule network graph queries
  - name: Chat
    description: AI chatbot for natural language queries
  - name: Advanced Analytics
    description: Top risk clients, anomaly trends, mule candidates, investigation reports, transaction search, simulation, and rule correlations
  - name: Demo Data
    description: On-demand demo data generation

paths:
  # ── Transactions ──────────────────────────────────────────
  /api/v1/transactions/evaluate:
    post:
      tags: [Transactions]
      summary: Evaluate a transaction for anomalies
      description: |
        Submits a transaction for real-time anomaly evaluation. The transaction is
        persisted, evaluated against all active rules (including the Isolation Forest model),
        and returns a composite risk score with per-rule breakdown.
      operationId: evaluateTransaction
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Transaction'
            examples:
              normalTransaction:
                summary: Normal transaction (likely PASS)
                value:
                  txnId: "TXN-NORMAL-001"
                  clientId: "CLIENT-001"
                  txnType: "NEFT"
                  amount: 45000.00
                  timestamp: 1739886764000
                  beneficiaryAccount: "1234567890"
                  beneficiaryIfsc: "HDFC0001234"
              blockTransaction:
                summary: Anomalous transaction (likely BLOCK)
                value:
                  txnId: "TXN-BLOCK-001"
                  clientId: "CLIENT-001"
                  txnType: "IFT"
                  amount: 95000.00
                  timestamp: 1739886764000
                  beneficiaryAccount: "9876543210"
                  beneficiaryIfsc: "ICIC0005678"
      responses:
        '200':
          description: Evaluation completed successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EvaluationResult'
        '400':
          description: Missing required fields (txnId, clientId, or txnType)

  /api/v1/transactions/{txnId}:
    get:
      tags: [Transactions]
      summary: Get a transaction by ID
      operationId: getTransaction
      parameters:
        - name: txnId
          in: path
          required: true
          schema:
            type: string
          example: "CLIENT-001-TXN-000001"
      responses:
        '200':
          description: Transaction found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Transaction'
        '404':
          description: Transaction not found

  /api/v1/transactions/client/{clientId}:
    get:
      tags: [Transactions]
      summary: List transactions by client ID
      operationId: getTransactionsByClient
      parameters:
        - name: clientId
          in: path
          required: true
          schema:
            type: string
          example: "CLIENT-001"
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            default: 50
        - name: before
          in: query
          required: false
          schema:
            type: integer
            format: int64
          description: Cursor for pagination — epoch millis timestamp
      responses:
        '200':
          description: Paginated list of transactions
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PagedTransactions'

  /api/v1/transactions/results/{txnId}:
    get:
      tags: [Transactions]
      summary: Get evaluation result for a transaction
      description: Returns the anomaly evaluation result. If Ollama is running, includes an AI explanation (generated on first view, cached).
      operationId: getEvaluationResult
      parameters:
        - name: txnId
          in: path
          required: true
          schema:
            type: string
          example: "IF-DEMO-001"
      responses:
        '200':
          description: Evaluation result found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EvaluationResult'
        '404':
          description: No evaluation result found

  /api/v1/transactions/results/client/{clientId}:
    get:
      tags: [Transactions]
      summary: List evaluation results by client ID
      operationId: getEvaluationResultsByClient
      parameters:
        - name: clientId
          in: path
          required: true
          schema:
            type: string
          example: "CLIENT-001"
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            default: 20
        - name: before
          in: query
          required: false
          schema:
            type: integer
            format: int64
          description: Cursor for pagination — epoch millis timestamp
      responses:
        '200':
          description: Paginated list of evaluation results
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PagedEvaluationResults'

  # ── Profiles ──────────────────────────────────────────────
  /api/v1/profiles/{clientId}:
    get:
      tags: [Profiles]
      summary: Get client behavioral profile
      description: |
        Returns the client's behavioral profile built from historical transaction data.
        Includes EWMA statistics, transaction type distribution, hourly TPS averages,
        and per-type amount averages.
      operationId: getClientProfile
      parameters:
        - name: clientId
          in: path
          required: true
          schema:
            type: string
          example: "CLIENT-001"
      responses:
        '200':
          description: Client profile found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ClientProfile'
        '404':
          description: No profile found (client has no transaction history)

  # ── Rules ─────────────────────────────────────────────────
  /api/v1/rules:
    get:
      tags: [Rules]
      summary: List all anomaly rules
      operationId: listRules
      responses:
        '200':
          description: List of all configured rules
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/AnomalyRule'
    post:
      tags: [Rules]
      summary: Create a new anomaly rule
      operationId: createRule
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AnomalyRule'
      responses:
        '200':
          description: Rule created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AnomalyRule'
        '400':
          description: Missing required fields (name or ruleType)

  /api/v1/rules/{ruleId}:
    get:
      tags: [Rules]
      summary: Get a specific rule by ID
      operationId: getRule
      parameters:
        - name: ruleId
          in: path
          required: true
          schema:
            type: string
          example: "RULE-IF"
      responses:
        '200':
          description: Rule found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AnomalyRule'
        '404':
          description: Rule not found
    put:
      tags: [Rules]
      summary: Update an existing rule
      operationId: updateRule
      parameters:
        - name: ruleId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AnomalyRule'
      responses:
        '200':
          description: Rule updated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AnomalyRule'
        '404':
          description: Rule not found
    delete:
      tags: [Rules]
      summary: Delete a rule
      operationId: deleteRule
      parameters:
        - name: ruleId
          in: path
          required: true
          schema:
            type: string
      responses:
        '204':
          description: Rule deleted successfully
        '404':
          description: Rule not found

  # ── Models ────────────────────────────────────────────────
  /api/v1/models/train/{clientId}:
    post:
      tags: [Models]
      summary: Train Isolation Forest model for a client
      operationId: trainModelForClient
      parameters:
        - name: clientId
          in: path
          required: true
          schema:
            type: string
          example: "CLIENT-001"
        - name: numTrees
          in: query
          required: false
          schema:
            type: integer
            default: 100
        - name: sampleSize
          in: query
          required: false
          schema:
            type: integer
            default: 256
      responses:
        '200':
          description: Model trained successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ModelMetadata'
        '500':
          description: Training failed

  /api/v1/models/train:
    post:
      tags: [Models]
      summary: Train Isolation Forest models for all clients
      operationId: trainAllModels
      parameters:
        - name: numTrees
          in: query
          required: false
          schema:
            type: integer
            default: 100
        - name: sampleSize
          in: query
          required: false
          schema:
            type: integer
            default: 256
      responses:
        '200':
          description: Training complete
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string

  /api/v1/models/{clientId}:
    get:
      tags: [Models]
      summary: Get model metadata for a client
      operationId: getModelMetadata
      parameters:
        - name: clientId
          in: path
          required: true
          schema:
            type: string
          example: "CLIENT-001"
      responses:
        '200':
          description: Model metadata found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ModelMetadata'
        '404':
          description: No trained model found

  # ── Review Queue ──────────────────────────────────────────
  /api/v1/review/queue:
    get:
      tags: [Review Queue]
      summary: List review queue items
      description: Returns paginated ALERT/BLOCK items for ops review with filtering.
      operationId: getQueueItems
      parameters:
        - name: action
          in: query
          required: false
          schema:
            type: string
            enum: [ALERT, BLOCK]
        - name: clientId
          in: query
          required: false
          schema:
            type: string
        - name: fromDate
          in: query
          required: false
          schema:
            type: integer
            format: int64
          description: Start of time range (epoch millis)
        - name: toDate
          in: query
          required: false
          schema:
            type: integer
            format: int64
          description: End of time range (epoch millis)
        - name: ruleId
          in: query
          required: false
          schema:
            type: string
        - name: feedbackStatus
          in: query
          required: false
          schema:
            type: string
            enum: [PENDING, TRUE_POSITIVE, FALSE_POSITIVE, AUTO_ACCEPTED]
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            default: 100
        - name: before
          in: query
          required: false
          schema:
            type: integer
            format: int64
          description: Cursor for pagination
      responses:
        '200':
          description: Paginated list of review queue items
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    items:
                      $ref: '#/components/schemas/ReviewQueueItem'
                  hasMore:
                    type: boolean
                  nextCursor:
                    type: integer
                    format: int64

  /api/v1/review/queue/{txnId}:
    get:
      tags: [Review Queue]
      summary: Get full detail for a review queue item
      description: Returns queue item + evaluation result + transaction + client profile.
      operationId: getQueueItemDetail
      parameters:
        - name: txnId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Full detail returned
          content:
            application/json:
              schema:
                type: object
                properties:
                  queueItem:
                    $ref: '#/components/schemas/ReviewQueueItem'
                  evaluation:
                    $ref: '#/components/schemas/EvaluationResult'
                  transaction:
                    $ref: '#/components/schemas/Transaction'
                  profile:
                    $ref: '#/components/schemas/ClientProfile'
        '404':
          description: Queue item not found

  /api/v1/review/queue/{txnId}/feedback:
    post:
      tags: [Review Queue]
      summary: Submit feedback on a review queue item
      operationId: submitFeedback
      parameters:
        - name: txnId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [status]
              properties:
                status:
                  type: string
                  enum: [TRUE_POSITIVE, FALSE_POSITIVE]
                feedbackBy:
                  type: string
                  example: "analyst-01"
      responses:
        '200':
          description: Feedback recorded
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReviewQueueItem'

  /api/v1/review/queue/bulk-feedback:
    post:
      tags: [Review Queue]
      summary: Bulk submit feedback on multiple items
      operationId: bulkSubmitFeedback
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [txnIds, status]
              properties:
                txnIds:
                  type: array
                  items:
                    type: string
                status:
                  type: string
                  enum: [TRUE_POSITIVE, FALSE_POSITIVE]
                feedbackBy:
                  type: string
      responses:
        '200':
          description: Bulk feedback recorded
          content:
            application/json:
              schema:
                type: object
                properties:
                  updated:
                    type: integer
                  failed:
                    type: integer

  /api/v1/review/stats:
    get:
      tags: [Review Queue]
      summary: Get review queue statistics
      operationId: getReviewStats
      parameters:
        - name: fromDate
          in: query
          required: false
          schema:
            type: integer
            format: int64
        - name: toDate
          in: query
          required: false
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: Queue statistics
          content:
            application/json:
              schema:
                type: object
                properties:
                  pending:
                    type: integer
                  truePositive:
                    type: integer
                  falsePositive:
                    type: integer
                  autoAccepted:
                    type: integer

  /api/v1/review/queue/{txnId}/ai-feedback:
    post:
      tags: [Review Queue]
      summary: Rate AI explanation as helpful or not
      operationId: submitAiFeedback
      parameters:
        - name: txnId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [helpful]
              properties:
                helpful:
                  type: boolean
                operatorId:
                  type: string
      responses:
        '200':
          description: AI feedback recorded
    get:
      tags: [Review Queue]
      summary: Get existing AI feedback for a transaction
      operationId: getAiFeedback
      parameters:
        - name: txnId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: AI feedback found
        '404':
          description: No AI feedback found

  /api/v1/review/weight-history:
    get:
      tags: [Review Queue]
      summary: Get rule weight change history
      operationId: getWeightHistory
      parameters:
        - name: ruleId
          in: query
          required: false
          schema:
            type: string
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            default: 50
        - name: before
          in: query
          required: false
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: Paginated weight change history
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    items:
                      $ref: '#/components/schemas/RuleWeightChange'
                  hasMore:
                    type: boolean
                  nextCursor:
                    type: integer
                    format: int64

  /api/v1/review/queue/triage:
    get:
      tags: [Review Queue]
      summary: Smart Alert Triage — LLM ranks pending alerts by urgency
      description: Analyzes up to 15 pending items using the LLM and returns a prioritized list with urgency levels and reasoning.
      operationId: getAlertTriage
      responses:
        '200':
          description: Ranked list of pending alerts
          content:
            application/json:
              schema:
                type: object
                properties:
                  triage:
                    type: array
                    items:
                      type: object
                      properties:
                        rank:
                          type: integer
                        txnId:
                          type: string
                        urgency:
                          type: string
                          enum: [CRITICAL, HIGH, MEDIUM, LOW]
                        reasoning:
                          type: string

  # ── Analytics ─────────────────────────────────────────────
  /api/v1/analytics/rules/performance:
    get:
      tags: [Analytics]
      summary: Per-rule TP/FP counts and precision from feedback
      operationId: getRulePerformance
      parameters:
        - name: fromDate
          in: query
          required: false
          schema:
            type: integer
            format: int64
          description: Start of time range (epoch millis)
        - name: toDate
          in: query
          required: false
          schema:
            type: integer
            format: int64
          description: End of time range (epoch millis)
      responses:
        '200':
          description: Rule performance metrics
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/RulePerformance'

  /api/v1/analytics/ai-feedback/stats:
    get:
      tags: [Analytics]
      summary: AI explanation feedback statistics
      operationId: getAiFeedbackStats
      responses:
        '200':
          description: Feedback stats
          content:
            application/json:
              schema:
                type: object
                properties:
                  helpful:
                    type: integer
                  notHelpful:
                    type: integer
                  total:
                    type: integer
                  helpfulPct:
                    type: number
                    format: double

  /api/v1/analytics/graph/client/{clientId}/network:
    get:
      tags: [Analytics]
      summary: Network graph nodes and edges for visualization
      operationId: getClientNetwork
      parameters:
        - name: clientId
          in: path
          required: true
          schema:
            type: string
          example: "CLIENT-007"
      responses:
        '200':
          description: Network graph data
          content:
            application/json:
              schema:
                type: object
                properties:
                  nodes:
                    type: array
                    items:
                      type: object
                  edges:
                    type: array
                    items:
                      type: object

  /api/v1/analytics/client/{clientId}/narrative:
    get:
      tags: [Analytics]
      summary: AI-generated plain-English client risk narrative
      description: Uses the LLM to generate a behavioral summary considering transaction patterns, rule triggers, and EWMA profile stats.
      operationId: getClientNarrative
      parameters:
        - name: clientId
          in: path
          required: true
          schema:
            type: string
          example: "CLIENT-001"
      responses:
        '200':
          description: Client narrative
          content:
            application/json:
              schema:
                type: object
                properties:
                  clientId:
                    type: string
                  narrative:
                    type: string

  # ── Configuration ─────────────────────────────────────────
  /api/v1/config/thresholds:
    get:
      tags: [Configuration]
      summary: Get alert/block thresholds and EWMA settings
      operationId: getThresholds
      responses:
        '200':
          description: Current threshold configuration
          content:
            application/json:
              schema:
                type: object
                properties:
                  alertThreshold:
                    type: number
                    example: 30.0
                  blockThreshold:
                    type: number
                    example: 70.0
                  ewmaAlpha:
                    type: number
                    example: 0.01
                  minProfileTxns:
                    type: integer
                    example: 20
    put:
      tags: [Configuration]
      summary: Update thresholds (live-reloadable)
      operationId: updateThresholds
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                alertThreshold:
                  type: number
                blockThreshold:
                  type: number
                ewmaAlpha:
                  type: number
                minProfileTxns:
                  type: integer
      responses:
        '200':
          description: Updated configuration

  /api/v1/config/feedback:
    get:
      tags: [Configuration]
      summary: Get feedback loop / auto-tuning settings
      operationId: getFeedbackConfig
      responses:
        '200':
          description: Feedback configuration
    put:
      tags: [Configuration]
      summary: Update feedback settings (live-reloadable)
      operationId: updateFeedbackConfig
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        '200':
          description: Updated configuration

  /api/v1/config/transaction-types:
    get:
      tags: [Configuration]
      summary: Get accepted transaction types
      operationId: getTransactionTypes
      responses:
        '200':
          description: Transaction types list
          content:
            application/json:
              schema:
                type: object
                properties:
                  types:
                    type: array
                    items:
                      type: string
                    example: ["NEFT", "RTGS", "IMPS", "UPI", "IFT"]
    put:
      tags: [Configuration]
      summary: Update accepted transaction types (live-reloadable)
      operationId: updateTransactionTypes
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                types:
                  type: array
                  items:
                    type: string
      responses:
        '200':
          description: Updated configuration

  /api/v1/config/silence:
    get:
      tags: [Configuration]
      summary: Get silence detection settings
      operationId: getSilenceConfig
      responses:
        '200':
          description: Silence detection configuration
          content:
            application/json:
              schema:
                type: object
                properties:
                  enabled:
                    type: boolean
                  checkIntervalMinutes:
                    type: integer
                  silenceMultiplier:
                    type: number
                  minExpectedTps:
                    type: number
                  minCompletedHours:
                    type: integer
    put:
      tags: [Configuration]
      summary: Update silence detection settings (live-reloadable)
      operationId: updateSilenceConfig
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        '200':
          description: Updated configuration

  /api/v1/config/twilio:
    get:
      tags: [Configuration]
      summary: Get Twilio notification settings (auth token masked)
      operationId: getTwilioConfig
      responses:
        '200':
          description: Twilio configuration
          content:
            application/json:
              schema:
                type: object
                properties:
                  enabled:
                    type: boolean
                  channel:
                    type: string
                    enum: [sms, whatsapp]
                  fromNumber:
                    type: string
                  toNumber:
                    type: string
                  accountSid:
                    type: string
                  authToken:
                    type: string
                    description: Masked for security
    put:
      tags: [Configuration]
      summary: Update Twilio settings (live-reloadable)
      operationId: updateTwilioConfig
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        '200':
          description: Updated configuration

  /api/v1/config/ollama:
    get:
      tags: [Configuration]
      summary: Get Ollama LLM settings
      operationId: getOllamaConfig
      responses:
        '200':
          description: Ollama configuration
          content:
            application/json:
              schema:
                type: object
                properties:
                  host:
                    type: string
                    example: "http://host.docker.internal:11434"
                  model:
                    type: string
                    example: "llama3.2:1b"
                  timeoutSeconds:
                    type: integer
                    example: 30
    put:
      tags: [Configuration]
      summary: Update Ollama LLM settings (live-reloadable)
      operationId: updateOllamaConfig
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        '200':
          description: Updated configuration

  /api/v1/config/aerospike:
    get:
      tags: [Configuration]
      summary: Get Aerospike connection info (read-only)
      operationId: getAerospikeInfo
      responses:
        '200':
          description: Aerospike connection details
          content:
            application/json:
              schema:
                type: object
                properties:
                  host:
                    type: string
                  port:
                    type: integer
                  namespace:
                    type: string

  # ── Silence Detection ─────────────────────────────────────
  /api/v1/silence:
    get:
      tags: [Silence Detection]
      summary: Get currently silent clients
      description: Returns enriched data including EWMA TPS, expected gap, silence duration, and last transaction time.
      operationId: getSilentClients
      responses:
        '200':
          description: List of silent clients
          content:
            application/json:
              schema:
                type: object
                properties:
                  silentClients:
                    type: array
                    items:
                      type: object
                      properties:
                        clientId:
                          type: string
                        ewmaHourlyTps:
                          type: number
                        expectedGapMinutes:
                          type: number
                        silenceDurationMinutes:
                          type: number
                        lastTxnTime:
                          type: integer
                          format: int64
                  count:
                    type: integer

  /api/v1/silence/check:
    post:
      tags: [Silence Detection]
      summary: Trigger immediate silence scan
      operationId: triggerSilenceCheck
      responses:
        '200':
          description: Scan completed
          content:
            application/json:
              schema:
                type: object
                properties:
                  scanned:
                    type: integer
                  silent:
                    type: integer

  # ── Beneficiary Graph ─────────────────────────────────────
  /api/v1/graph/status:
    get:
      tags: [Beneficiary Graph]
      summary: Graph metadata
      description: Returns total beneficiaries, clients, last refresh time, and readiness.
      operationId: getGraphStatus
      responses:
        '200':
          description: Graph status
          content:
            application/json:
              schema:
                type: object
                properties:
                  totalBeneficiaries:
                    type: integer
                  totalClients:
                    type: integer
                  lastRefresh:
                    type: integer
                    format: int64
                  isReady:
                    type: boolean

  /api/v1/graph/beneficiary/{ifsc}/{account}:
    get:
      tags: [Beneficiary Graph]
      summary: Fan-in count and sender list for a beneficiary
      operationId: getBeneficiaryFanIn
      parameters:
        - name: ifsc
          in: path
          required: true
          schema:
            type: string
          example: "HDFC0001234"
        - name: account
          in: path
          required: true
          schema:
            type: string
          example: "1234567890"
      responses:
        '200':
          description: Beneficiary fan-in data
          content:
            application/json:
              schema:
                type: object
                properties:
                  fanInCount:
                    type: integer
                  senders:
                    type: array
                    items:
                      type: string

  /api/v1/graph/client/{clientId}:
    get:
      tags: [Beneficiary Graph]
      summary: Shared beneficiary count, ratio, and network density
      operationId: getClientGraphMetrics
      parameters:
        - name: clientId
          in: path
          required: true
          schema:
            type: string
          example: "CLIENT-007"
      responses:
        '200':
          description: Client graph metrics
          content:
            application/json:
              schema:
                type: object
                properties:
                  sharedBeneficiaryCount:
                    type: integer
                  sharedBeneficiaryRatio:
                    type: number
                  networkDensity:
                    type: number

  # ── Chat ──────────────────────────────────────────────────
  /api/v1/chat:
    post:
      tags: [Chat]
      summary: Send a natural language query
      description: AI chatbot powered by Ollama. Supports queries about transactions, clients, rules, and system status.
      operationId: chat
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [message]
              properties:
                message:
                  type: string
                  example: "How many clients did UPI in last 15 mins?"
      responses:
        '200':
          description: Chat response
          content:
            application/json:
              schema:
                type: object
                properties:
                  summary:
                    type: string
                  columns:
                    type: array
                    items:
                      type: string
                  rows:
                    type: array
                    items:
                      type: array
                      items:
                        type: string
                  queryType:
                    type: string

  # ── Advanced Analytics ────────────────────────────────────
  /api/v1/advanced/top-risk-clients:
    get:
      tags: [Advanced Analytics]
      summary: Get top risk clients ranked by score or alert/block count
      operationId: getTopRiskClients
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
            default: 10
          description: Number of clients to return
        - name: sortBy
          in: query
          schema:
            type: string
            enum: [avgScore, maxScore, blockCount, alertCount]
            default: avgScore
          description: Sort criteria
      responses:
        '200':
          description: Ranked list of highest-risk clients
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    clientId:
                      type: string
                    avgScore:
                      type: number
                      format: double
                    maxScore:
                      type: number
                      format: double
                    alertCount:
                      type: integer
                    blockCount:
                      type: integer
                    totalEvaluated:
                      type: integer
                    totalTransactions:
                      type: integer

  /api/v1/advanced/system-overview:
    get:
      tags: [Advanced Analytics]
      summary: Get system-wide overview dashboard
      description: Returns total clients, transactions, review queue depth by status, silent client count, and beneficiary graph health.
      operationId: getSystemOverview
      responses:
        '200':
          description: System overview
          content:
            application/json:
              schema:
                type: object
                properties:
                  totalClients:
                    type: integer
                  totalTransactions:
                    type: integer
                    format: int64
                  reviewQueue:
                    type: object
                    properties:
                      pending:
                        type: integer
                      truePositive:
                        type: integer
                      falsePositive:
                        type: integer
                      autoAccepted:
                        type: integer
                  silentClients:
                    type: integer
                  beneficiaryGraph:
                    type: object
                    properties:
                      ready:
                        type: boolean
                      totalBeneficiaries:
                        type: integer
                      totalClients:
                        type: integer
                      lastRefresh:
                        type: string

  /api/v1/advanced/search-transactions:
    get:
      tags: [Advanced Analytics]
      summary: Search transactions across all clients with flexible filters
      operationId: searchTransactions
      parameters:
        - name: fromDate
          in: query
          schema:
            type: integer
            format: int64
          description: Start time (epoch millis)
        - name: toDate
          in: query
          schema:
            type: integer
            format: int64
          description: End time (epoch millis)
        - name: clientId
          in: query
          schema:
            type: string
          description: Filter by client ID
        - name: txnType
          in: query
          schema:
            type: string
            enum: [NEFT, RTGS, IMPS, UPI, IFT]
          description: Filter by transaction type
        - name: minAmount
          in: query
          schema:
            type: number
            format: double
          description: Minimum transaction amount
        - name: maxAmount
          in: query
          schema:
            type: number
            format: double
          description: Maximum transaction amount
        - name: beneficiaryAccount
          in: query
          schema:
            type: string
          description: Filter by beneficiary account number
        - name: limit
          in: query
          schema:
            type: integer
            default: 50
          description: Max results to return
      responses:
        '200':
          description: Matching transactions
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    txnId:
                      type: string
                    clientId:
                      type: string
                    txnType:
                      type: string
                    amount:
                      type: number
                      format: double
                    timestamp:
                      type: integer
                      format: int64
                    beneficiaryAccount:
                      type: string
                    beneficiaryIfsc:
                      type: string

  /api/v1/advanced/simulate:
    post:
      tags: [Advanced Analytics]
      summary: Simulate a transaction evaluation without persisting (dry-run)
      description: Runs all 16 rules and returns the score, action, and per-rule breakdown without saving the transaction, updating the profile, or creating a review queue entry.
      operationId: simulateTransaction
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Transaction'
      responses:
        '200':
          description: Simulation result
          content:
            application/json:
              schema:
                type: object
                properties:
                  simulated:
                    type: boolean
                    example: true
                  result:
                    $ref: '#/components/schemas/EvaluationResult'
                  note:
                    type: string
                    description: Present when client has insufficient history

  /api/v1/advanced/anomaly-trends:
    get:
      tags: [Advanced Analytics]
      summary: Get anomaly count and score trends over time buckets
      operationId: getAnomalyTrends
      parameters:
        - name: fromDate
          in: query
          schema:
            type: integer
            format: int64
          description: Start time epoch millis (default 7 days ago)
        - name: toDate
          in: query
          schema:
            type: integer
            format: int64
          description: End time epoch millis (default now)
        - name: bucketSize
          in: query
          schema:
            type: string
            enum: [15m, 1h, 6h, 1d]
            default: 1h
          description: Time bucket size
      responses:
        '200':
          description: Anomaly trends
          content:
            application/json:
              schema:
                type: object
                properties:
                  fromDate:
                    type: integer
                    format: int64
                  toDate:
                    type: integer
                    format: int64
                  bucketSize:
                    type: string
                  bucketCount:
                    type: integer
                  totalAlerts:
                    type: integer
                  totalBlocks:
                    type: integer
                  totalEvaluated:
                    type: integer
                  trend:
                    type: array
                    items:
                      type: object
                      properties:
                        timestamp:
                          type: integer
                          format: int64
                        total:
                          type: integer
                        passCount:
                          type: integer
                        alertCount:
                          type: integer
                        blockCount:
                          type: integer
                        avgScore:
                          type: number
                          format: double

  /api/v1/advanced/mule-candidates:
    get:
      tags: [Advanced Analytics]
      summary: Get top beneficiaries ranked by fan-in (potential mule accounts)
      description: High fan-in indicates money from many clients converging on one account.
      operationId: getMuleCandidates
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
          description: Number of candidates to return
        - name: minFanIn
          in: query
          schema:
            type: integer
            default: 2
          description: Minimum fan-in to qualify
      responses:
        '200':
          description: Ranked mule candidates
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    beneficiaryKey:
                      type: string
                    fanIn:
                      type: integer
                    senders:
                      type: array
                      items:
                        type: string

  /api/v1/advanced/investigation-report/{clientId}:
    get:
      tags: [Advanced Analytics]
      summary: Generate a comprehensive investigation report for a client
      description: Includes profile summary, evaluation statistics, top triggered rules, beneficiary network metrics, and an AI-generated risk narrative.
      operationId: generateInvestigationReport
      parameters:
        - name: clientId
          in: path
          required: true
          schema:
            type: string
          description: Client ID to investigate
      responses:
        '200':
          description: Investigation report
          content:
            application/json:
              schema:
                type: object
                properties:
                  clientId:
                    type: string
                  generatedAt:
                    type: integer
                    format: int64
                  profile:
                    type: object
                    properties:
                      totalTransactions:
                        type: integer
                        format: int64
                      ewmaAmount:
                        type: number
                        format: double
                      ewmaHourlyTps:
                        type: number
                        format: double
                      txnTypeCounts:
                        type: object
                        additionalProperties:
                          type: integer
                  evaluationSummary:
                    type: object
                    properties:
                      totalEvaluated:
                        type: integer
                      alerts:
                        type: integer
                      blocks:
                        type: integer
                      avgCompositeScore:
                        type: number
                        format: double
                  topTriggeredRules:
                    type: array
                    items:
                      type: object
                      properties:
                        ruleId:
                          type: string
                        triggerCount:
                          type: integer
                  beneficiaryNetwork:
                    type: object
                    properties:
                      totalBeneficiaries:
                        type: integer
                      sharedBeneficiaries:
                        type: integer
                      networkDensity:
                        type: number
                        format: double
                  aiNarrative:
                    type: string

  /api/v1/advanced/rule-correlations:
    get:
      tags: [Advanced Analytics]
      summary: Get rule co-occurrence matrix with Jaccard similarity
      description: Shows which rules tend to fire together. Useful for finding compound attack patterns or redundant rules.
      operationId: getRuleCorrelations
      parameters:
        - name: fromDate
          in: query
          schema:
            type: integer
            format: int64
          description: Start time epoch millis
        - name: toDate
          in: query
          schema:
            type: integer
            format: int64
          description: End time epoch millis
      responses:
        '200':
          description: Rule correlation analysis
          content:
            application/json:
              schema:
                type: object
                properties:
                  totalEvaluationsAnalyzed:
                    type: integer
                  uniqueRulesTriggered:
                    type: integer
                  correlationPairs:
                    type: array
                    items:
                      type: object
                      properties:
                        ruleA:
                          type: string
                        ruleB:
                          type: string
                        coOccurrenceCount:
                          type: integer
                        ruleATriggers:
                          type: integer
                        ruleBTriggers:
                          type: integer
                        jaccardIndex:
                          type: number
                          format: double
                  ruleTriggerCounts:
                    type: object
                    additionalProperties:
                      type: integer

  # ── Demo Data ─────────────────────────────────────────────
  /api/v1/demo/generate:
    post:
      tags: [Demo Data]
      summary: Generate demo transactions and profiles on-the-fly
      description: Generates clients with EWMA profiles, transactions with realistic patterns, and injects anomalies. Data is immediately visible in the dashboard.
      operationId: generateDemoData
      responses:
        '200':
          description: Demo data generation summary
          content:
            application/json:
              schema:
                type: object
                properties:
                  clientsCreated:
                    type: integer
                  transactionsGenerated:
                    type: integer
                  pass:
                    type: integer
                  alert:
                    type: integer
                  block:
                    type: integer

components:
  schemas:
    Transaction:
      type: object
      required: [txnId, clientId, txnType, amount]
      properties:
        txnId:
          type: string
          example: "CLIENT-001-TXN-000001"
        clientId:
          type: string
          example: "CLIENT-001"
        txnType:
          type: string
          enum: [NEFT, RTGS, IMPS, UPI, IFT]
          example: "NEFT"
        amount:
          type: number
          format: double
          example: 50000.00
        timestamp:
          type: integer
          format: int64
          description: Epoch milliseconds. Defaults to current time if not provided.
          example: 1739886764000
        beneficiaryAccount:
          type: string
          example: "1234567890"
        beneficiaryIfsc:
          type: string
          example: "HDFC0001234"

    EvaluationResult:
      type: object
      properties:
        txnId:
          type: string
        clientId:
          type: string
        compositeScore:
          type: number
          format: double
          description: "Weighted composite risk score (0–100)"
        riskLevel:
          type: string
          enum: [LOW, MEDIUM, HIGH, CRITICAL]
        action:
          type: string
          enum: [PASS, ALERT, BLOCK]
        ruleResults:
          type: array
          items:
            $ref: '#/components/schemas/RuleResult'
        evaluatedAt:
          type: integer
          format: int64
        aiExplanation:
          type: string
          description: LLM-generated plain-English explanation (generated on first view, cached)
        attackPattern:
          type: string
          description: JSON string with pattern, confidence, and summary from LLM classification

    RuleResult:
      type: object
      properties:
        ruleId:
          type: string
        ruleName:
          type: string
        ruleType:
          type: string
          enum:
            - TRANSACTION_TYPE_ANOMALY
            - TPS_SPIKE
            - AMOUNT_ANOMALY
            - HOURLY_AMOUNT_ANOMALY
            - AMOUNT_PER_TYPE_ANOMALY
            - BENEFICIARY_RAPID_REPEAT
            - BENEFICIARY_CONCENTRATION
            - BENEFICIARY_AMOUNT_REPETITION
            - DAILY_CUMULATIVE_AMOUNT
            - NEW_BENEFICIARY_VELOCITY
            - DORMANCY_REACTIVATION
            - CROSS_CHANNEL_BENEFICIARY_AMOUNT
            - SEASONAL_DEVIATION
            - MULE_NETWORK
            - TEMPORAL_RULE_CORRELATION
            - ISOLATION_FOREST
        triggered:
          type: boolean
        deviationPct:
          type: number
          format: double
        partialScore:
          type: number
          format: double
        riskWeight:
          type: number
          format: double
        reason:
          type: string

    AnomalyRule:
      type: object
      properties:
        ruleId:
          type: string
        name:
          type: string
        description:
          type: string
        ruleType:
          type: string
          enum:
            - TRANSACTION_TYPE_ANOMALY
            - TPS_SPIKE
            - AMOUNT_ANOMALY
            - HOURLY_AMOUNT_ANOMALY
            - AMOUNT_PER_TYPE_ANOMALY
            - BENEFICIARY_RAPID_REPEAT
            - BENEFICIARY_CONCENTRATION
            - BENEFICIARY_AMOUNT_REPETITION
            - DAILY_CUMULATIVE_AMOUNT
            - NEW_BENEFICIARY_VELOCITY
            - DORMANCY_REACTIVATION
            - CROSS_CHANNEL_BENEFICIARY_AMOUNT
            - SEASONAL_DEVIATION
            - MULE_NETWORK
            - TEMPORAL_RULE_CORRELATION
            - ISOLATION_FOREST
        variancePct:
          type: number
          format: double
        riskWeight:
          type: number
          format: double
          default: 1.0
        enabled:
          type: boolean
          default: true
        params:
          type: object
          additionalProperties:
            type: string

    ClientProfile:
      type: object
      properties:
        clientId:
          type: string
        txnTypeCounts:
          type: object
          additionalProperties:
            type: integer
            format: int64
        totalTxnCount:
          type: integer
          format: int64
        ewmaAmount:
          type: number
          format: double
        amountM2:
          type: number
          format: double
        ewmaHourlyTps:
          type: number
          format: double
        tpsM2:
          type: number
          format: double
        completedHoursCount:
          type: integer
          format: int64
        avgAmountByType:
          type: object
          additionalProperties:
            type: number
            format: double
        amountM2ByType:
          type: object
          additionalProperties:
            type: number
            format: double
        amountCountByType:
          type: object
          additionalProperties:
            type: integer
            format: int64
        ewmaHourlyAmount:
          type: number
          format: double
        hourlyAmountM2:
          type: number
          format: double
        lastUpdated:
          type: integer
          format: int64
        lastHourBucket:
          type: string

    ModelMetadata:
      type: object
      properties:
        clientId:
          type: string
        treeCount:
          type: integer
        featureCount:
          type: integer
        trainingSamples:
          type: integer
        trainedAt:
          type: integer
          format: int64

    ReviewQueueItem:
      type: object
      properties:
        txnId:
          type: string
        clientId:
          type: string
        action:
          type: string
          enum: [ALERT, BLOCK]
        compositeScore:
          type: number
          format: double
        status:
          type: string
          enum: [PENDING, TRUE_POSITIVE, FALSE_POSITIVE, AUTO_ACCEPTED]
        feedbackBy:
          type: string
        feedbackAt:
          type: integer
          format: int64
        createdAt:
          type: integer
          format: int64
        autoAcceptDeadline:
          type: integer
          format: int64

    RuleWeightChange:
      type: object
      properties:
        ruleId:
          type: string
        previousWeight:
          type: number
          format: double
        newWeight:
          type: number
          format: double
        reason:
          type: string
        timestamp:
          type: integer
          format: int64

    RulePerformance:
      type: object
      properties:
        ruleId:
          type: string
        ruleName:
          type: string
        ruleType:
          type: string
        truePositives:
          type: integer
        falsePositives:
          type: integer
        total:
          type: integer
        precision:
          type: number
          format: double

    PagedTransactions:
      type: object
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/Transaction'
        hasMore:
          type: boolean
        nextCursor:
          type: integer
          format: int64

    PagedEvaluationResults:
      type: object
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/EvaluationResult'
        hasMore:
          type: boolean
        nextCursor:
          type: integer
          format: int64
